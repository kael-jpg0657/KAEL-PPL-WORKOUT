      <div class="prog-row"><span>Session Progress</span><span>${pct}%</span></div>
      <div class="prog-track"><div class="prog-fill ${type}" id="prog-fill" style="width:${pct}%"></div></div>
    </div>`;

  // Warmup
  const wu = WARMUPS[type];
  const wuOpen = !!S.expanded[`wu-${S.selectedDate}`];
  html += `
    <div class="slabel"><span>🔥 Warm-Up</span></div>
    <div class="warmup-card">
      <div class="wu-hdr" onclick="toggleWu()">
        <div class="wu-icon">🔥</div>
        <div><div class="wu-title">Warm-Up Routine</div><div class="wu-sub">${wu.length} exercises · 5–8 min</div></div>
        <div class="wu-chev ${wuOpen ? 'open' : ''}">▼</div>
      </div>
      <div class="wu-body ${wuOpen ? 'open' : ''}">
        ${wu.map(w=>`<div class="wu-item"><div class="wu-dot"></div><div class="wu-name">${w.name}</div><div class="wu-detail">${w.detail}</div></div>`).join('')}
      </div>
    </div>`;

  // Exercises
  html += `<div class="slabel"><span>💪 Exercises</span></div><div class="${type}-s" id="ex-list-wrap">`;
  exs.forEach((ex, ei) => {
    if (hiddenSet.has(ei)) return; // skip deleted/hidden exercise
    const expKey = `ex-${S.selectedDate}-${ei}`;
    const isOpen = !!S.expanded[expKey];
    const exSetCount = getExSets(type, ei, sets);
    let exDone = 0;
    for (let s=0;s<exSetCount;s++) { if (S.setChecks[`${S.selectedDate}-${ei}-${s}`]) exDone++; }
    const isExDone = exDone === exSetCount;
    const ovKey = type + '|' + ei;
    const baseKgOv = (S.weightOverrides && S.weightOverrides[ovKey] != null) ? S.weightOverrides[ovKey] : ex.baseKg;
    const nameOv = (S.weightOverrides && S.weightOverrides[type+'|name|'+ei]) || ex.name;
    const kg = calcWeight(ex, week, baseKgOv);
    const nextWeekKg = baseKgOv ? nearestAvail(baseKgOv * getWeekParams(week+2).wMult) : null;
    const aiKey = type + '|ai|' + ei;
    const aiResult = (S.weightOverrides && S.weightOverrides[aiKey]) || null;
    const isCustom = ei >= (type === 'push' ? PUSH_EX : type === 'pull' ? PULL_EX : LEGS_EX).length;

    let setsHtml = '';
    for (let s=0;s<exSetCount;s++) {
      const sk = `${S.selectedDate}-${ei}-${s}`;
      const checked = !!S.setChecks[sk];
      const log = (S.actualLogs && S.actualLogs[sk]) || {};
      const logKg = log.kg != null ? log.kg : (kg != null ? kg : '');
      const logReps = log.reps != null ? log.reps : '';
      setsHtml += `
        <div class="set-row ${checked?'done':''}" id="sr-${sk}">
          <div class="set-lbl">Set ${s+1}</div>
          <div class="set-detail">${repsLo}–${repsHi} reps${kg ? ` · ${kg}kg` : ''}</div>
          <button class="set-btn ${checked?'done':''}" id="sb-${sk}" onclick="toggleSet('${sk}')" ${isDone&&!checked?'disabled':''}>✓</button>
        </div>
        <div class="actual-log-row">
          <div class="alog-field">
            <label>Actual kg</label>
            <input type="number" step="0.5" min="0" class="alog-input" value="${logKg}" placeholder="${kg||0}"
              id="alk-${sk}" onclick="event.stopPropagation()" onchange="saveActualLog('${sk}','kg',this.value)">
          </div>
          <div class="alog-field">
            <label>Actual reps</label>
            <input type="number" step="1" min="0" class="alog-input" value="${logReps}" placeholder="${repsHi}"
              id="alr-${sk}" onclick="event.stopPropagation()" onchange="saveActualLog('${sk}','reps',this.value)">
          </div>
        </div>`;
    }
    // Add Set button
    setsHtml += `<button class="add-set-btn" onclick="event.stopPropagation();addExtraSet('${type}',${ei})" ${isDone?'disabled':''}>+ Set</button>`;
    if (exSetCount > sets) {
      setsHtml += `<button class="rem-set-btn" onclick="event.stopPropagation();removeExtraSet('${type}',${ei})" ${isDone?'disabled':''}>− Set</button>`;
    }

    // Notes for this exercise
    const noteKey = `${S.selectedDate}-${ei}`;
    const noteVal = (S.exerciseNotes && S.exerciseNotes[noteKey]) || '';

    html += `
      <div class="ex-card ${type} ${isExDone?'done':''}" id="exc-${S.selectedDate}-${ei}">
        <div class="ex-hdr" onclick="toggleEx(${ei})">
          <div class="ex-num">${ei+1}</div>
          <div class="ex-info">
            <div class="ex-name">${nameOv}${isExDone?' ✓':''}</div>
            <div class="ex-meta">${exSetCount} sets · ${repsLo}–${repsHi} reps${kg?` · ${kg}kg DB`:' · Bodyweight'}</div>
          </div>
          <div class="ex-chev ${isOpen?'open':''}">▼</div>
        </div>
        <div class="ex-body ${isOpen?'open':''}">
          <div class="guide"><div class="guide-lbl">📋 Paano Gawin</div><div class="guide-txt">${ex.guide}</div></div>
          
          <!-- EDITABLE NAME -->
          <div style="margin-bottom:8px">
            <div style="font-size:.58rem;text-transform:uppercase;letter-spacing:1.2px;color:var(--sub);font-weight:700;margin-bottom:4px">✏️ Exercise Name</div>
            <input class="ex-name-input" type="text" value="${nameOv.replace(/"/g,'&quot;')}" 
              onchange="saveExName('${type}',${ei},this.value)" 
              onclick="event.stopPropagation()" placeholder="Exercise name...">
          </div>

          <!-- EDITABLE WEIGHT + AI SUGGEST -->
          ${ex.baseKg !== null ? `
          <div class="weight-edit-row">
            <label>Base Weight (kg):</label>
            <input class="weight-input" type="number" min="0" step="0.5" 
              value="${baseKgOv != null ? baseKgOv : ''}" 
              id="wi-${type}-${ei}"
              onclick="event.stopPropagation()"
              onchange="saveBaseWeight('${type}',${ei},this.value)"
              placeholder="kg">
            <button class="weight-suggest-btn" onclick="event.stopPropagation();getWeightSuggestion('${type}',${ei})" id="wsb-${type}-${ei}">
              📊 Progression
            </button>
          </div>
          ${aiResult ? `<div class="ai-suggest" id="ai-${type}-${ei}"><div class="ai-lbl">📊 Weight Progression Guide</div>${aiResult}</div>` : `<div class="ai-suggest" id="ai-${type}-${ei}" style="display:none"></div>`}
          ` : ''}

          ${kg ? `<div class="wt-badge">🏋️ Week ${week} weight: <strong>${kg}kg</strong><span class="next">${nextWeekKg&&nextWeekKg!==kg?` → ${nextWeekKg}kg sa Week ${week+2}`:' (max progression)'}</span></div>` : ''}
          <div class="sets-wrap">${setsHtml}</div>

          <div class="ex-notes-wrap">
            <label class="ex-notes-lbl">📝 Notes (optional)</label>
            <textarea class="ex-notes-input" placeholder="e.g. mahirap sa set 3, baba ang energy, masakit kamay..."
              onclick="event.stopPropagation()" onchange="saveExerciseNote('${type}',${ei},this.value)">${noteVal}</textarea>
          </div>

          <div class="ol-note">🔥 <strong>Phase ${getPhase(week).phaseNum} — ${phase}:</strong> ${exSetCount} sets · ${repsLo}–${repsHi} reps · ${getPhase(week).note}
          </div>
          ${isCustom
            ? `<button class="ex-del-btn" onclick="event.stopPropagation();deleteCustomEx('${type}',${ei})">🗑 Tanggalin</button>`
            : `<button class="ex-del-btn" onclick="event.stopPropagation();hideBaseEx('${type}',${ei})">🗑 Tanggalin</button>`}
        </div>
      </div>`;
  });

  // Add exercise form
  const showForm = S.showAddForm === type;
  const hiddenList = (S.hiddenBaseEx && S.hiddenBaseEx[type]) || [];
  const allBaseExs = type === 'push' ? PUSH_EX : type === 'pull' ? PULL_EX : LEGS_EX;
  const restoreHtml = hiddenList.length ? `
  <div class="restore-wrap">
    <div class="restore-lbl">Hidden exercises — tap para ibalik:</div>
    <div class="restore-chips">
      ${hiddenList.map(ei => {
        const nameOv = (S.weightOverrides && S.weightOverrides[type+'|name|'+ei]) || (allBaseExs[ei] && allBaseExs[ei].name) || '';
        return `<button class="restore-chip" onclick="event.stopPropagation();restoreBaseEx('${type}',${ei})">↩ ${nameOv}</button>`;
      }).join('')}
    </div>
  </div>` : '';
  html += `</div>
  <button class="add-ex-btn" onclick="toggleAddForm('${type}')">+ Mag-dagdag ng Exercise</button>
  ${restoreHtml}
  ${showForm ? `
  <div class="add-ex-form">
    <div><label>Exercise Name</label><input type="text" id="aef-name" placeholder="e.g. DB Fly, Push-Up..." onclick="event.stopPropagation()"></div>
    <div><label>Guide / Notes (optional)</label><textarea id="aef-guide" placeholder="Paano gawin..." onclick="event.stopPropagation()"></textarea></div>
    <div class="aef-row">
      <div><label>Base Weight (kg)</label><input type="number" id="aef-kg" placeholder="0 = bodyweight" step="0.5" min="0" onclick="event.stopPropagation()"></div>
      <div><label>Rest (sec)</label><input type="number" id="aef-rest" value="60" step="15" min="30" onclick="event.stopPropagation()"></div>
    </div>
    <div class="aef-actions">
      <button class="aef-cancel" onclick="toggleAddForm(null)">Cancel</button>
      <button class="aef-save" onclick="saveNewExercise('${type}')">SAVE</button>
    </div>
  </div>` : ''}`;

  if (!isDone) {
    html += `<button class="finish-btn ${type} ${allDone?'vis':''}" id="finish-btn" onclick="completeSession()">✓ TAPOS NA · SAVE SESSION</button>`;
  } else {
    html += `<div style="margin-top:14px;padding:14px;background:var(--done);border:1px solid var(--doneb);border-radius:var(--r);text-align:center;font-size:.8rem;color:var(--legs)">✓ Session nai-save na. ${S.completedSessions[S.selectedDate].exercises ? S.completedSessions[S.selectedDate].exercises.length + ' exercises' : ''}</div>`;
  }

  wrap.innerHTML = html;
}

function renderHistory() {
  const wrap = document.getElementById('hist-wrap');
  const sessions = Object.entries(S.completedSessions).sort((a,b)=>b[0].localeCompare(a[0]));
  if (!sessions.length) {
    wrap.innerHTML = `<div class="hist-empty">Wala pang natapos na session.<br>Magsimula ka na! 💪</div>`;
    return;
  }

  // Group by month
  const groups = {};
  sessions.forEach(([date, data]) => {
    const [y,m] = date.split('-');
    const key = `${y}-${m}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push([date, data]);
  });

  const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];

  let html = '';
  Object.entries(groups).sort((a,b)=>b[0].localeCompare(a[0])).forEach(([gKey, items]) => {
    const [gy, gm] = gKey.split('-');
    html += `<div class="hist-group"><div class="hist-month">${months[parseInt(gm)-1]} ${gy} · ${items.length} sessions</div>`;
    items.forEach(([date, data]) => {
      const d = fromISO(date);
      const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const expKey = `hist-${date}`;
      const isOpen = !!S.expanded[expKey];
      const exList = data.exercises || [];
      html += `
        <div class="hist-item" onclick="toggleHistItem('${date}')">
          <div class="hi-row">
            <div class="hi-dot ${data.type}"></div>
            <div class="hi-title">${data.type?.toUpperCase()} DAY</div>
            <div class="hi-date">${dayNames[d.getDay()]}, ${date}</div>
          </div>
          <div class="hi-stats">
            <div class="hi-stat">Week ${data.week||'?'}</div>
            <div class="hi-stat">${data.totalSets||0} sets done</div>
            <div class="hi-stat">${data.phase||''}</div>
            ${data.duration ? `<div class="hi-stat">${data.duration} min</div>` : ''}
          </div>
          <div class="hi-exlist ${isOpen?'open':''}">
            ${exList.map(e=>{
              const plannedTxt = `${e.kg?e.kg+'kg ·':''} ${e.sets}×${e.repsLo}–${e.repsHi}`;
              let actualTxt = '';
              if (e.actualSets && e.actualSets.some(a=>a.kg!=null||a.reps!=null)) {
                const parts = e.actualSets.map((a,i)=> {
                  if (a.kg==null && a.reps==null) return null;
                  return `S${i+1}: ${a.kg!=null?a.kg+'kg':''}${a.kg!=null&&a.reps!=null?'×':''}${a.reps!=null?a.reps+'r':''}`;
                }).filter(Boolean).join('  ');
                actualTxt = `<div class="hi-actual">✓ Actual: ${parts}</div>`;
              }
              const noteTxt = e.note ? `<div class="hi-note">📝 ${e.note}</div>` : '';
              return `<div class="hi-ex-block"><div class="hi-ex"><span>${e.name}</span><span>${plannedTxt}</span></div>${actualTxt}${noteTxt}</div>`;
            }).join('')}
          </div>
        </div>`;
    });
    html += '</div>';
  });

  html += `<button class="hist-clear-btn" onclick="clearHistory()">🗑 I-clear ang history</button>`;
  wrap.innerHTML = html;
}

// ══════════════════════════════════════════════════════════════════
// INTERACTIONS
// ══════════════════════════════════════════════════════════════════
let activeTab = 'workout';

// ══════════════════════════════════════════════════════════════════
// PROGRESS TAB
// ══════════════════════════════════════════════════════════════════

let progFilter = 'all'; // 'all' | 'push' | 'pull' | 'legs'

function renderProgress() {
  const wrap = document.getElementById('prog-wrap');
  const sessions = Object.entries(S.completedSessions).sort((a,b)=>a[0].localeCompare(b[0]));
  const filtered = progFilter === 'all' ? sessions : sessions.filter(([,d])=>d.type===progFilter);

  if (sessions.length < 2) {
    wrap.innerHTML = `<div class="prog-empty">Kumpletuhin ang kahit 2 sessions para makita ang progression.<br><br>💪 Keep going!</div>`;
    return;
  }

  // ── Overview cards ──
  const totalVol = sessions.reduce((acc,[,d])=>{
    (d.exercises||[]).forEach(e=>{ if(e.kg) acc += e.kg * e.sets * ((e.repsLo+e.repsHi)/2); });
    return acc;
  }, 0);
  const lastWeek = sessions.filter(([dt])=>{ const d=fromISO(dt); const now=new Date(); const diff=(now-d)/864e5; return diff<=7; });
  const prevWeek = sessions.filter(([dt])=>{ const d=fromISO(dt); const now=new Date(); const diff=(now-d)/864e5; return diff>7&&diff<=14; });
  const lwVol = lastWeek.reduce((acc,[,d])=>{ (d.exercises||[]).forEach(e=>{ if(e.kg) acc+=e.kg*e.sets*((e.repsLo+e.repsHi)/2); }); return acc; },0);
  const pwVol = prevWeek.reduce((acc,[,d])=>{ (d.exercises||[]).forEach(e=>{ if(e.kg) acc+=e.kg*e.sets*((e.repsLo+e.repsHi)/2); }); return acc; },0);
  const volChange = pwVol > 0 ? Math.round((lwVol-pwVol)/pwVol*100) : null;
  const streak = S.streak || 0;
  const totalSessions = sessions.length;

  let html = `<div class="prog-overview">
    <div class="prog-ov-card">
      <div class="prog-ov-title">Total Sessions</div>
      <div class="prog-ov-val">${totalSessions}</div>
      <div class="prog-ov-sub">since Week 1</div>
    </div>
    <div class="prog-ov-card">
      <div class="prog-ov-title">Current Streak</div>
      <div class="prog-ov-val">${streak}</div>
      <div class="prog-ov-sub">days in a row 🔥</div>
    </div>
    <div class="prog-ov-card">
      <div class="prog-ov-title">This Week Volume</div>
      <div class="prog-ov-val">${Math.round(lwVol).toLocaleString()}</div>
      <div class="prog-ov-sub">kg lifted</div>
    </div>
    <div class="prog-ov-card">
      <div class="prog-ov-title">vs Last Week</div>
      <div class="prog-ov-val" style="color:${volChange===null?'var(--sub)':volChange>=0?'var(--legs)':'var(--push)'}">${volChange===null?'—':(volChange>=0?'+':'')+volChange+'%'}</div>
      <div class="prog-ov-sub">${volChange===null?'need more data':volChange>0?'Progressive Overload! 🔥':volChange===0?'Same volume':'Volume dropped'}</div>
    </div>
  </div>`;

  // ── Filter buttons ──
  html += `<div class="prog-filter">
    <button class="prog-filter-btn ${progFilter==='all'?'active':''}" onclick="setProgFilter('all')">All</button>
    <button class="prog-filter-btn ${progFilter==='push'?'active':''}" onclick="setProgFilter('push')" style="${progFilter==='push'?'':''}">Push</button>
    <button class="prog-filter-btn ${progFilter==='pull'?'active':''}" onclick="setProgFilter('pull')">Pull</button>
    <button class="prog-filter-btn ${progFilter==='legs'?'active':''}" onclick="setProgFilter('legs')">Legs</button>
  </div>`;

  // ── Per-exercise progression ──
  // Collect all unique exercises from filtered sessions
  const exMap = {}; // exName -> [{date, kg, sets, repsLo, repsHi, volume, type}]
  filtered.forEach(([date, data]) => {
    (data.exercises||[]).forEach(ex => {
      if (!ex.kg) return; // skip bodyweight
      if (!exMap[ex.name]) exMap[ex.name] = [];
      const vol = ex.kg * ex.sets * ((ex.repsLo + ex.repsHi) / 2);
      exMap[ex.name].push({ date, kg: ex.kg, sets: ex.sets, repsLo: ex.repsLo, repsHi: ex.repsHi, vol, type: data.type });
    });
  });

  const exNames = Object.keys(exMap).filter(n => exMap[n].length >= 1);
  if (!exNames.length) {
    html += `<div class="prog-empty">Wala pang data para sa ${progFilter} sessions.</div>`;
    wrap.innerHTML = html;
    return;
  }

  html += `<div class="prog-section"><div class="prog-section-title">Exercise Progression</div>`;

  exNames.forEach(name => {
    const entries = exMap[name].slice(-8); // last 8 sessions with this exercise
    const type = entries[0].type;
    const maxVol = Math.max(...entries.map(e=>e.vol));
    const first = entries[0];
    const last = entries[entries.length-1];
    const kgChange = last.kg - first.kg;
    const volChange = entries.length > 1 ? last.vol - entries[entries.length-2].vol : 0;
    const isUp = kgChange > 0 || (kgChange === 0 && volChange > 0);
    const isDown = kgChange < 0 || (kgChange === 0 && volChange < 0);

    // Mini bar chart (volume per session)
    const bars = entries.map((e, i) => {
      const pct = maxVol > 0 ? Math.max(8, Math.round(e.vol / maxVol * 100)) : 8;
      const isLast = i === entries.length - 1;
      const isUp2 = i > 0 && e.vol > entries[i-1].vol;
      return `<div class="prog-bar-wrap">
        <div class="prog-bar-val">${e.kg}kg</div>
        <div class="prog-bar ${type} ${isUp2?'up':''}" style="height:${pct}%" title="${e.date}: ${e.kg}kg × ${e.sets}sets"></div>
        <div class="prog-bar-lbl">${e.date.slice(5)}</div>
      </div>`;
    }).join('');

    // Trend text
    let trendText = '', trendClass = 'same';
    if (kgChange > 0) { trendText = `+${kgChange}kg na ang weight mo vs unang session! 🔥 Progressive overload confirmed.`; trendClass = 'up'; }
    else if (kgChange < 0) { trendText = `Bumaba ng ${Math.abs(kgChange)}kg ang weight. Baka deload week o injury prevention — ok lang yan.`; trendClass = 'down'; }
    else if (volChange > 0) { trendText = `Same weight pero tumaas ang volume (+${Math.round(volChange)}kg vol). Volume progression — counts as overload! 💪`; trendClass = 'up'; }
    else if (volChange < 0) { trendText = `Same weight, bumaba ang volume. Try adding 1 more set next session.`; trendClass = 'down'; }
    else if (entries.length === 1) { trendText = `Unang session pa lang — mag-log ng isa pa para makita ang trend.`; trendClass = 'same'; }
    else { trendText = `Consistent ang weight at volume. Pag kaya na ang ${last.repsHi} reps sa lahat ng sets, taas ng weight!`; trendClass = 'same'; }

    html += `<div class="prog-card">
      <div class="prog-card-name">${name} <span style="font-weight:400;color:var(--sub);font-size:.75rem">(${entries.length} sessions)</span></div>
      <div class="prog-chart" style="align-items:flex-end">${bars}</div>
      <div class="prog-summary">
        <div class="prog-stat">
          <div class="prog-stat-val ${isUp?'up':isDown?'down':'same'}">${last.kg}kg</div>
          <div class="prog-stat-lbl">Current</div>
        </div>
        <div class="prog-stat">
          <div class="prog-stat-val ${kgChange>0?'up':kgChange<0?'down':'same'}">${kgChange>0?'+':''}${kgChange}kg</div>
          <div class="prog-stat-lbl">Weight Δ</div>
        </div>
        <div class="prog-stat">
          <div class="prog-stat-val">${last.sets}</div>
          <div class="prog-stat-lbl">Sets</div>
        </div>
        <div class="prog-stat">
          <div class="prog-stat-val ${volChange>0?'up':volChange<0?'down':'same'}">${Math.round(last.vol)}</div>
          <div class="prog-stat-lbl">Volume</div>
        </div>
      </div>
      <div class="prog-trend ${trendClass}">${trendText}</div>
    </div>`;
  });

  html += `</div>`;

  // ── Recent sessions list ──
  html += `<div class="prog-section"><div class="prog-section-title">Recent Sessions</div>`;
  const recent = filtered.slice(-10).reverse();
  recent.forEach(([date, data]) => {
    const vol = (data.exercises||[]).reduce((acc,e)=>acc+(e.kg?e.kg*e.sets*((e.repsLo+e.repsHi)/2):0),0);
    html += `<div class="prog-week-row">
      <div class="prog-week-dot ${data.type}"></div>
      <div style="flex:1;color:var(--text);font-weight:600">${data.type?.toUpperCase()} · ${date}</div>
      <div style="color:var(--sub);font-size:.7rem">${data.totalSets||0} sets · ${Math.round(vol).toLocaleString()}kg vol</div>
    </div>`;
  });
  html += `</div>`;

  wrap.innerHTML = html;
}

function setProgFilter(f) {
  progFilter = f;
  renderProgress();
}

function switchTab(tab) {
  activeTab = tab;
  document.getElementById('pane-workout').style.display = tab === 'workout' ? '' : 'none';
  document.getElementById('pane-history').style.display = tab === 'history' ? '' : 'none';
  document.getElementById('pane-progress').style.display = tab === 'progress' ? '' : 'none';
  document.getElementById('tab-workout').classList.toggle('active', tab === 'workout');
  document.getElementById('tab-history').classList.toggle('active', tab === 'history');
  document.getElementById('tab-progress').classList.toggle('active', tab === 'progress');
  if (tab === 'history') renderHistory();
  if (tab === 'progress') renderProgress();
}

function changeMonth(dir) {
  S.viewMonth += dir;
  if (S.viewMonth < 0)  { S.viewMonth = 11; S.viewYear--; }
  if (S.viewMonth > 11) { S.viewMonth = 0;  S.viewYear++; }
  save(); renderHeader(); renderCalendar();
}

function selectDate(iso) {
  S.selectedDate = iso; save(); renderCalendar(); renderSession(); renderStats();
}

function toggleWu() {
  const k = `wu-${S.selectedDate}`;
  S.expanded[k] = !S.expanded[k]; save(); renderSession();
}

function toggleEx(ei) {
  const k = `ex-${S.selectedDate}-${ei}`;
  S.expanded[k] = !S.expanded[k]; save(); renderSession();
}

function toggleHistItem(date) {
  const k = `hist-${date}`;
  S.expanded[k] = !S.expanded[k]; save(); renderHistory();
}

function toggleSet(sk) {
  S.setChecks[sk] = !S.setChecks[sk]; save();

  const parts = sk.split('-');
  const si = parseInt(parts.pop());
  const ei = parseInt(parts.pop());
  const dateISO = parts.join('-');

  const type = getActiveDayType(dateISO);
  const exs = getExercises(type);
  const week = getWeekNumber(dateISO);
  const {sets, repsLo, repsHi} = getWeekParams(week);

  // Update button + row
  const btn = document.getElementById(`sb-${sk}`);
  const row = document.getElementById(`sr-${sk}`);
  if (btn) btn.classList.toggle('done', !!S.setChecks[sk]);
  if (row) row.classList.toggle('done', !!S.setChecks[sk]);

  // Exercise done?
  const exSetCountTS = getExSets(type, ei, sets);
  let exDone = true;
  for (let s=0;s<exSetCountTS;s++) { if (!S.setChecks[`${dateISO}-${ei}-${s}`]) { exDone = false; break; } }
  const card = document.getElementById(`exc-${dateISO}-${ei}`);
  if (card) {
    card.classList.toggle('done', exDone);
    const nm = card.querySelector('.ex-name');
    const nameOvTS = (S.weightOverrides && S.weightOverrides[type+'|name|'+ei]) || exs[ei].name;
    if (nm) nm.textContent = nameOvTS + (exDone ? ' ✓' : '');
  }

  // Total
  let totalSets = 0;
  let doneSets = 0;
  exs.forEach((_,i2) => { const sc = getExSets(type, i2, sets); totalSets += sc; for (let s=0;s<sc;s++) { if (S.setChecks[`${dateISO}-${i2}-${s}`]) doneSets++; } });
  const pct = Math.round(doneSets/totalSets*100);
  const pf = document.getElementById('prog-fill');
  if (pf) pf.style.width = pct + '%';
  document.querySelectorAll('.htag').forEach(t => { if (t.textContent.includes('done') && !t.textContent.includes('COMPLETE')) t.textContent = `${doneSets}/${totalSets} done`; });

  renderStats();

  if (S.setChecks[sk]) {
    toast('Set done! 💪');
    const allDone = doneSets === totalSets;
    if (!allDone) startTimer(exs[ei].restSec || getPhase(week).restSec || 90);
    const fb = document.getElementById('finish-btn');
    if (fb) fb.classList.toggle('vis', allDone);
    if (allDone) toast('🎉 Lahat ng sets tapos! I-tap ang SAVE button.');
  }
}

function completeSession() {
  const type = getActiveDayType(S.selectedDate);
  const exs = getExercises(type);
  const week = getWeekNumber(S.selectedDate);
  const params = getWeekParams(week);

  const sessionData = {
    type,
    week,
    phase: params.phase,
    totalSets: exs.reduce((acc,_,ei)=>acc+getExSets(type,ei,params.sets),0),
    exercises: exs.map((ex,ei) => {
      const ovKey = type + '|' + ei;
      const baseKgOv = (S.weightOverrides && S.weightOverrides[ovKey] != null) ? S.weightOverrides[ovKey] : ex.baseKg;
      const nameOv = (S.weightOverrides && S.weightOverrides[type+'|name|'+ei]) || ex.name;
      const setCount = getExSets(type, ei, params.sets);
      const actualSets = [];
      for (let s=0; s<setCount; s++) {
        const sk = `${S.selectedDate}-${ei}-${s}`;
        const log = (S.actualLogs && S.actualLogs[sk]) || {};
        actualSets.push({ kg: log.kg != null ? log.kg : null, reps: log.reps != null ? log.reps : null });
      }
      const noteKey = `${S.selectedDate}-${ei}`;
      return {
        name: nameOv,
        kg: calcWeight(ex, week, baseKgOv),
        sets: setCount,
        repsLo: params.repsLo,
        repsHi: params.repsHi,
        actualSets,
        note: (S.exerciseNotes && S.exerciseNotes[noteKey]) || '',
      };
    }),
    completedAt: new Date().toISOString(),
  };

  S.completedSessions[S.selectedDate] = sessionData;
  S.streak = (S.streak || 0) + 1;
  save();
  toast('✅ Session saved! Magpahinga ka. 🙌');
  renderCalendar();
  renderSession();
  renderStats();
}

function clearHistory() {
  if (!confirm('I-clear lahat ng history? Hindi na ito mababalik.')) return;
  S.completedSessions = {};
  S.setChecks = {};
  S.streak = 0;
  save(); renderHistory(); renderStats(); renderCalendar();
}

// ══════════════════════════════════════════════════════════════════
// EDITABLE EXERCISES & WEIGHT
// ══════════════════════════════════════════════════════════════════

function saveActualLog(sk, field, val) {
  if (!S.actualLogs) S.actualLogs = {};
  if (!S.actualLogs[sk]) S.actualLogs[sk] = {};
  const num = parseFloat(val);
  if (!isNaN(num) && num >= 0) {
    S.actualLogs[sk][field] = num;
  } else {
    delete S.actualLogs[sk][field];
    if (Object.keys(S.actualLogs[sk]).length === 0) delete S.actualLogs[sk];
  }
  save();
}

function saveExerciseNote(type, ei, val) {
  if (!S.exerciseNotes) S.exerciseNotes = {};
  const noteKey = `${S.selectedDate}-${ei}`;
  const v = val.trim();
  if (v) S.exerciseNotes[noteKey] = v;
  else delete S.exerciseNotes[noteKey];
  save();
}

function saveExName(type, ei, val) {
  if (!S.weightOverrides) S.weightOverrides = {};
  const v = val.trim();
  if (v) S.weightOverrides[type + '|name|' + ei] = v;
  else delete S.weightOverrides[type + '|name|' + ei];
  save();
  // Just update the displayed name in header without full re-render
  const card = document.getElementById(`exc-${S.selectedDate}-${ei}`);
  if (card) {
    const nm = card.querySelector('.ex-name');
    const exDone = card.classList.contains('done');
    if (nm) nm.textContent = (v || getExercises(type)[ei].name) + (exDone ? ' ✓' : '');
  }
}

function saveBaseWeight(type, ei, val) {
  if (!S.weightOverrides) S.weightOverrides = {};
  const kg = parseFloat(val);
  if (!isNaN(kg) && kg >= 0) {
    S.weightOverrides[type + '|' + ei] = kg;
  } else {
    delete S.weightOverrides[type + '|' + ei];
  }
  save();
  // Re-render session to update weight badge + set details
  renderSession();
}

function getWeightSuggestion(type, ei) {
  if (!S.weightOverrides) S.weightOverrides = {};
  const ovKey = type + '|' + ei;
  const aiKey = type + '|ai|' + ei;
  const exs = getExercises(type);
  const ex = exs[ei];
  if (!ex) return;

  const currentBase = S.weightOverrides[ovKey] != null ? S.weightOverrides[ovKey] : ex.baseKg;
  if (!currentBase) return;

  const week = getWeekNumber(S.selectedDate);
  const params = getWeekParams(week);
  const nameOv = S.weightOverrides[type + '|name|' + ei] || ex.name;
  const currentKg = calcWeight(ex, week, currentBase);
  const exSetCount = getExSets(type, ei, params.sets);

  const aiBox = document.getElementById('ai-' + type + '-' + ei);
  const btn = document.getElementById('wsb-' + type + '-' + ei);
  if (!aiBox) return;

  // Find next available weight above current base
  const nextWeights = AVAIL.filter(w => w > currentBase);
  const nextBase = nextWeights.length ? nextWeights[0] : null;
  const nextKg = nextBase ? calcWeight({baseKg: nextBase}, week, nextBase) : null;

  // How many sessions to progress (based on phase)
  const sessionsToProg = params.repsHi >= 12 ? 2 : params.repsHi >= 10 ? 3 : 4;

  // Build suggestion text
  let lines = [];

  // Current status
  lines.push(`<strong>Kasalukuyan:</strong> ${currentBase}kg base → <strong>${currentKg}kg</strong> working weight (Week ${week}, ${params.phase})`);

  // Progression rule
  if (nextBase) {
    lines.push(`<strong>Susunod na weight:</strong> ${nextBase}kg base → <strong>${nextKg}kg</strong> working weight`);
    lines.push(`<strong>Kailan mag-progress:</strong> Kapag kaya mo na ang ${params.repsHi} reps sa lahat ng ${exSetCount} sets nang ${sessionsToProg} sessions in a row — taas na ng weight.`);
  } else {
    lines.push(`<strong>Max na!</strong> ${currentBase}kg na ang pinakamataas sa iyong set. Mag-focus na sa reps, tempo, at form.`);
  }

  // Phase-specific tip
  const tips = {
    'Foundation': `Huwag muna mag-ego lift — form muna. Kapag malinis ang ${params.repsHi} reps, taas ng weight.`,
    'Progressive Overload': `Dagdag weight kapag nakaka-${params.repsHi} reps ka sa lahat ng sets. Ito ang pinaka-importante ngayon.`,
    'Strength Focus': `Mababa ang reps, mabigat ang weight. Kung hindi kaya ang ${params.repsLo} reps, bumaba ng isang level.`,
    'Hypertrophy Peak': `Mag-focus sa slow eccentric (3-4 sec pababa). Kahit hindi tumaas ang weight, lalaki pa rin ang muscle kapag mabagal ang tempo.`,
  };
  const tip = tips[params.phase] || '';
  if (tip) lines.push(`<strong>Tip (${params.phase}):</strong> ${tip}`);

  const result = lines.join('<br>');
  S.weightOverrides[aiKey] = result;
  save();

  aiBox.style.display = '';
  aiBox.innerHTML = '<div class="ai-lbl">📊 Weight Progression Guide</div>' + result;
}

function addExtraSet(type, ei) {
  if (!S.extraSets) S.extraSets = {};
if (!S.actualLogs) S.actualLogs = {};
if (!S.exerciseNotes) S.exerciseNotes = {};
  const key = type + '|' + ei;
  S.extraSets[key] = (S.extraSets[key] || 0) + 1;
  save();
  renderSession();
  toast('Set added! 💪');
}

function removeExtraSet(type, ei) {
  if (!S.extraSets) S.extraSets = {};
if (!S.actualLogs) S.actualLogs = {};
if (!S.exerciseNotes) S.exerciseNotes = {};
  const key = type + '|' + ei;
  if (!S.extraSets[key] || S.extraSets[key] <= 0) return;
  // Uncheck the last set's checkbox before removing
  const week = getWeekNumber(S.selectedDate);
  const baseSets = getWeekParams(week).sets;
  const total = baseSets + S.extraSets[key];
  const lastSk = `${S.selectedDate}-${ei}-${total - 1}`;
  delete S.setChecks[lastSk];
  S.extraSets[key]--;
  if (S.extraSets[key] === 0) delete S.extraSets[key];
  save();
  renderSession();
}

function toggleAddForm(type) {
  S.showAddForm = S.showAddForm === type ? null : type;
  save();
  renderSession();
  if (type) {
    setTimeout(() => {
      const el = document.getElementById('aef-name');
      if (el) el.focus();
    }, 100);
  }
}

function saveNewExercise(type) {
  const name = document.getElementById('aef-name')?.value?.trim();
  if (!name) { toast('Lagyan ng pangalan ang exercise!'); return; }
  const guide = document.getElementById('aef-guide')?.value?.trim() || 'Gawin nang tama at may full range of motion.';
  const kgVal = parseFloat(document.getElementById('aef-kg')?.value);
  const restVal = parseInt(document.getElementById('aef-rest')?.value) || 60;
  const baseKg = (!isNaN(kgVal) && kgVal > 0) ? kgVal : null;
  const cat = baseKg ? 'isolation' : 'bodyweight';

  if (!S.customExercises) S.customExercises = {};
  if (!S.customExercises[type]) S.customExercises[type] = [];
  S.customExercises[type].push({ name, guide, baseKg, cat, restSec: restVal });
  S.showAddForm = null;
  save();
  toast(`✅ "${name}" naidagdag na!`);
  renderSession();
}

function hideBaseEx(type, ei) {
  const exs = getExercises(type);
  const ex = exs[ei];
  if (!ex) return;
  const nameOv = (S.weightOverrides && S.weightOverrides[type+'|name|'+ei]) || ex.name;
  if (!confirm(`Tanggalin ang "${nameOv}" sa ${type.toUpperCase()} day? Pwede mo pa rin ito ibalik later.`)) return;
  if (!S.hiddenBaseEx) S.hiddenBaseEx = {};
  if (!S.hiddenBaseEx[type]) S.hiddenBaseEx[type] = [];
  if (!S.hiddenBaseEx[type].includes(ei)) S.hiddenBaseEx[type].push(ei);
  save();
  renderSession();
  toast('🗑 Exercise natanggal sa list.');
}

function restoreBaseEx(type, ei) {
  if (!S.hiddenBaseEx || !S.hiddenBaseEx[type]) return;
  S.hiddenBaseEx[type] = S.hiddenBaseEx[type].filter(i => i !== ei);
  save();
  renderSession();
  toast('↩️ Exercise naibalik na.');
}

function deleteCustomEx(type, ei) {
  const baseCount = type === 'push' ? PUSH_EX.length : type === 'pull' ? PULL_EX.length : LEGS_EX.length;
  const customIdx = ei - baseCount;
  if (customIdx < 0 || !S.customExercises?.[type]) return;
  if (!confirm(`Tanggalin ang "${S.customExercises[type][customIdx]?.name}"?`)) return;
  S.customExercises[type].splice(customIdx, 1);
  // Clean up overrides for this index and shift higher ones
  if (!S.weightOverrides) S.weightOverrides = {};
  delete S.weightOverrides[type + '|' + ei];
  delete S.weightOverrides[type + '|name|' + ei];
  delete S.weightOverrides[type + '|ai|' + ei];
  save();
  renderSession();
  toast('🗑 Exercise natanggal.');
}

// ══════════════════════════════════════════════════════════════════
// TIMER
// ══════════════════════════════════════════════════════════════════
const CIRC = 2 * Math.PI * 88;
let timerIv = null, timerTotal = 90, timerLeft = 90, activePreset = 90;

function timerColor(r) { return r > .5 ? '#4ee88a' : r > .25 ? '#f5c518' : '#ff3d5c'; }

function fmtTime(s) { const m=Math.floor(s/60); return m>0?`${m}:${String(s%60).padStart(2,'0')}`:String(s); }

function startTimer(secs) {
  if (timerIv) clearInterval(timerIv);
  timerTotal = timerLeft = secs; activePreset = secs;
  const ov = document.getElementById('timer-ov');
  const disp = document.getElementById('t-disp');
  const arc = document.getElementById('t-arc');
  const msg = document.getElementById('t-msg');

  msg.textContent = MOTIVATIONS[Math.floor(Math.random()*MOTIVATIONS.length)];
  document.querySelectorAll('.p-btn').forEach(b => {
    const map = {'45s':45,'1 min':60,'1:30':90,'2 min':120,'3 min':180};
    b.classList.toggle('active', map[b.textContent.trim()] === secs);
  });
  ov.classList.add('show');

  function tick() {
    const r = timerLeft / timerTotal;
    arc.style.strokeDashoffset = CIRC * (1 - r);
    arc.style.stroke = timerColor(r);
    disp.textContent = fmtTime(timerLeft);
    if (timerLeft <= 0) {
      clearInterval(timerIv); timerIv = null;
      beep();
      setTimeout(() => ov.classList.remove('show'), 800);
      return;
    }
    timerLeft--;
  }
  tick();
  timerIv = setInterval(tick, 1000);
}

function beep() {
  try {
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    [0,.2,.4].forEach(d => {
      const o=ctx.createOscillator(), g=ctx.createGain();
      o.connect(g); g.connect(ctx.destination);
      o.frequency.value=880; o.type='sine';
      g.gain.setValueAtTime(.3,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.25);
      o.start(ctx.currentTime+d); o.stop(ctx.currentTime+d+.25);
    });
  } catch(e){}
}

function skipTimer() { if(timerIv){clearInterval(timerIv);timerIv=null;} document.getElementById('timer-ov').classList.remove('show'); }
function addTime(s) { timerLeft=Math.min(timerLeft+s,600); timerTotal=Math.max(timerTotal,timerLeft); }
function setPreset(s) { startTimer(s); }

function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// ══════════════════════════════════════════════════════════════════
// THEME
// ══════════════════════════════════════════════════════════════════
function applyTheme(theme) {
  document.documentElement.setAttribute('data-theme', theme);
  const btn = document.getElementById('theme-btn');
  if (btn) btn.textContent = theme === 'dark' ? '☀️' : '🌙';
  // Update PWA theme-color meta
  const mc = document.querySelector('meta[name="theme-color"]');
  if (mc) mc.setAttribute('content', theme === 'dark' ? '#07070e' : '#f4f4f8');
}

function toggleTheme() {
  const current = document.documentElement.getAttribute('data-theme') || 'dark';
  const next = current === 'dark' ? 'light' : 'dark';
  S.theme = next; save();
  applyTheme(next);
}

// ══════════════════════════════════════════════════════════════════
render();
applyTheme(S.theme || 'dark');

// ── PWA: Service Worker ──
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').then(reg => {
      // Force check for updates every load
      reg.update().catch(()=>{});

      reg.addEventListener('updatefound', () => {
        const newWorker = reg.installing;
        if (!newWorker) return;
        newWorker.addEventListener('statechange', () => {
          if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
            // New version ready — activate it immediately
            newWorker.postMessage('SKIP_WAITING');
          }
        });
      });
    }).catch(() => {});

    // Auto-reload once when the new service worker takes control
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      location.reload();
    });
  });
}

// ── PWA: Install prompt (Android "Add to Home Screen") ──
let deferredPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('install-banner')) return;
  const banner = document.createElement('div');
  banner.id = 'install-banner';
  banner.innerHTML = `
    <div style="display:flex;align-items:center;justify-content:space-between;gap:10px">
      <span>📲 I-install ang app para sa offline access</span>
      <div style="display:flex;gap:8px;flex-shrink:0">
        <button onclick="installApp()" style="background:var(--accent);border:none;border-radius:8px;padding:7px 14px;color:#07070e;font-family:'Bebas Neue',sans-serif;font-size:.9rem;letter-spacing:1px;cursor:pointer">INSTALL</button>
        <button onclick="dismissBanner()" style="background:transparent;border:1px solid var(--border);border-radius:8px;padding:7px 10px;color:var(--sub);cursor:pointer;font-size:.8rem">✕</button>
      </div>
    </div>`;
  banner.style.cssText = 'position:fixed;bottom:0;left:0;right:0;background:var(--s3);border-top:1px solid var(--border2);padding:12px 16px;z-index:1000;font-size:.8rem;color:var(--text);font-family:Inter,sans-serif';
  document.body.appendChild(banner);
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const { outcome } = await deferredPrompt.userChoice;
  deferredPrompt = null;
  dismissBanner();
  if (outcome === 'accepted') toast('✅ App naka-install na! Hanapin sa home screen. 📱');
}

function dismissBanner() {
  const b = document.getElementById('install-banner');
  if (b) b.remove();
}
</script>
